<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | CATMIS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    height:100vh;
    display:flex;
}

/* LEFT SIDE (IMAGE AREA) */
.left-panel{
    width:67%;
    background: linear-gradient(to bottom, #0f2027, #203a43);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.left-panel h1{
    font-size:40px;
}

/* RIGHT SIDE (LOGIN AREA) */
.right-panel{
    width:33%;
    background:#eef1f4;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* LOGIN CARD */
.login-card{
    width:80%;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.login-card h2{
    margin-top:0;
    margin-bottom:20px;
}

/* INPUTS */
.login-card input{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:20px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* BUTTON */
.login-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#0077b6;
    color:white;
    border-radius:6px;
    font-size:15px;
    cursor:pointer;
}

.login-btn:hover{
    background:#005f8f;
}

#error{
    margin-top:10px;
}

</style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left-panel">

    <!-- YOU CAN PLACE YOUR IMAGE HERE LATER -->
    <div>
        <h1>CATMIS</h1>
        <p>Centralized Assessment and Tuition Management Information System</p>
    </div>

</div>


<!-- RIGHT SIDE LOGIN -->
<div class="right-panel">

<div class="login-card">

<h2>Login</h2>

<form id="loginForm">

<label>Username</label>
<input type="text" id="username" required>

<label>Password</label>
<input type="password" id="password" required>

<button type="submit" class="login-btn">Login</button>

</form>

<p id="error" style="color:red;"></p>

</div>
</div>


<script>

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim().toLowerCase();

    if (username === "admin") {
        localStorage.setItem("role", "admin");
        window.location.href = "admin_dashboard.html";
    } 
    else if (username === "user") {
        localStorage.setItem("role", "user");
        window.location.href = "user_dashboard.html";
    } 
    else {
        document.getElementById("error").textContent = "Invalid username.";
    }

});

</script>

</body>
</html>
