<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tuition Assessment | CATMIS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== GLOBAL ===== */
body { margin:0; font-family:Arial; background:#eef1f4; }
.sidebar {
    width:250px; height:100vh; position:fixed;
    background:linear-gradient(to bottom,#0f2027,#203a43);
    color:white; display:flex; flex-direction:column;
}
.sidebar-header { padding:25px; border-bottom:1px solid rgba(255,255,255,.1); }
.sidebar ul { list-style:none; padding:0; margin:20px 0; }
.sidebar ul li { padding:12px 25px; }
.sidebar ul li a { color:white; text-decoration:none; display:block; }
.sidebar ul li:hover { background:rgba(255,255,255,.1); }
.active { background:rgba(255,255,255,.15); }
.logout-btn { background:#ff3b30; border:none; color:white; padding:12px; width:100%; cursor:pointer; margin-top:auto; }
.main { margin-left:250px; padding:40px; }

.card {
    background:white; padding:25px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.05);
    margin-bottom:30px;
}
input, select {
    padding:10px; width:100%;
    margin-bottom:15px;
}
button.primary {
    background:#0077b6; color:white;
    border:none; padding:10px 15px;
    border-radius:6px; cursor:pointer;
}
table {
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,.05);
}

th, td {
    padding:10px;
    border-bottom:1px solid #eee;
    text-align:center;
}

th {
    background:#f2f4f7;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>CATMIS</h2>
        <p>CCS Portal</p>
    </div>
    <ul>
        <li><a href="admin_dashboard.html">🏠 Admin Dashboard</a></li>
        <li class="active"><a href="#">📂 Tuition Assessment</a></li>
        <li><a href="user_management.html">👥 User Management</a></li>
        <li><a href="payment_history.html">📄 Payment History</a></li>
        <li><a href="audit_logs.html">🕒 Audit Logs</a></li>
    </ul>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="main">
    <h2>Tuition Assessment</h2>

    <div class="card">
        <h3>Tuition Matrix</h3>
        <div id="tuitionContainer"></div>
    </div>
</div>


<script>
let tuitionData = JSON.parse(localStorage.getItem("tuitionData")) || {
    "G1-3": [],
    "G4-6": [],
    "G7-10": [],
    "G11-12": []
};    

let tuitionRules = JSON.parse(localStorage.getItem("tuitionRules")) || [
    { grade: "10", section: "", amount: 20000 },
    { grade: "11", section: "STEM-A", amount: 30000 },
    { grade: "11", section: "ABM-B", amount: 28000 }
];

function renderTables(){

let container = document.getElementById("tuitionContainer");
container.innerHTML = "";

Object.keys(tuitionData).forEach(group => {

let groupDiv = document.createElement("div");
groupDiv.innerHTML = `<h3>${group}</h3>`;

tuitionData[group].forEach((entry, index) => {

let table = document.createElement("table");
table.style.marginBottom = "20px";

let rowsHTML = "";

// render fees vertically
entry.fees.forEach((fee, feeIndex) => {

rowsHTML += `
<tr>
<td contenteditable="true">${fee.name}</td>
<td contenteditable="true">${fee.amount}</td>
<td>
<button onclick="saveFee('${group}', ${index}, ${feeIndex}, this)">💾</button>
<button onclick="deleteFee('${group}', ${index}, ${feeIndex})">🗑</button>
</td>
</tr>
`;

});

let total = calculateTotal(entry.fees);

table.innerHTML = `
<thead>
<tr>
<th colspan="3">${entry.section || "General"}</th>
</tr>
<tr>
<th>Fee Type</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody>
${rowsHTML}
<tr>
<td><strong>TOTAL</strong></td>
<td><strong>${total}</strong></td>
<td></td>
</tr>
</tbody>
`;

groupDiv.appendChild(table);

// ➕ Add Fee Button
let addFeeBtn = document.createElement("button");
addFeeBtn.textContent = "➕ Add Fee";
addFeeBtn.className = "primary";
addFeeBtn.onclick = () => addFee(group, index);

groupDiv.appendChild(addFeeBtn);

});

// ➕ Add Section (for SHS or grouping)
let addSectionBtn = document.createElement("button");
addSectionBtn.textContent = `➕ Add Section (${group})`;
addSectionBtn.className = "primary";
addSectionBtn.style.marginBottom = "30px";

addSectionBtn.onclick = () => addSection(group);

groupDiv.appendChild(addSectionBtn);

container.appendChild(groupDiv);

});

}

function calculateTotal(fees){
return fees.reduce((sum, f) => sum + Number(f.amount || 0), 0);
}

function addSection(group){

let section = prompt("Enter Section/Track (leave blank if none):");

tuitionData[group].push({
    section: section ? section.toUpperCase() : "",
    fees: [
        { name: "Tuition", amount: 0 },
        { name: "Registration Fee", amount: 0 }
    ]
});

saveData();
renderTables();

}

function addFee(group, index){

let feeName = prompt("Enter Fee Name (e.g. Laboratory):");
if(!feeName) return;

let amount = prompt("Enter Amount:");
if(!amount || isNaN(amount)) return;

tuitionData[group][index].fees.push({
    name: feeName,
    amount: Number(amount)
});

saveData();
renderTables();

}

function deleteFee(group, entryIndex, feeIndex){

if(confirm("Delete this fee?")){
    tuitionData[group][entryIndex].fees.splice(feeIndex,1);
    saveData();
    renderTables();
}

}

function saveFee(group, entryIndex, feeIndex, btn){

let row = btn.parentNode.parentNode;
let name = row.cells[0].textContent.trim();
let amount = Number(row.cells[1].textContent);

tuitionData[group][entryIndex].fees[feeIndex] = {
    name: name,
    amount: amount
};

saveData();
renderTables();

}

function saveRow(group, index, btn){

let row = btn.parentNode.parentNode;
let cells = row.cells;

let updated = {
    section: cells[0].textContent.toUpperCase(),
    tuition: cells[1].textContent,
    registration: cells[2].textContent,
    testing: cells[3].textContent,
    instructional: cells[4].textContent,
    membership: cells[5].textContent,
    lunch: cells[6].textContent,
    athletics: cells[7].textContent,
    library: cells[8].textContent,
    energy: cells[9].textContent
};

tuitionData[group][index] = updated;

saveData();
renderTables();

}

function addRow(group){

tuitionData[group].push({
    section: "",
    tuition: 0,
    registration: 0,
    testing: 0,
    instructional: 0,
    membership: 0,
    lunch: 0,
    athletics: 0,
    library: 0,
    energy: 0
});

saveData();
renderTables();

}

function deleteRow(group, index){

if(confirm("Delete this row?")){
    tuitionData[group].splice(index,1);
    saveData();
    renderTables();
}

}

function getStudentTuition(grade, section){

let group = "";

if(grade >=1 && grade <=3) group = "G1-3";
else if(grade <=6) group = "G4-6";
else if(grade <=10) group = "G7-10";
else group = "G11-12";

// SHS: match section
let match = tuitionData[group].find(r =>
    r.section === section.toUpperCase()
);

if(match) return calculateTotal(match);

// fallback (no section)
return calculateTotal(tuitionData[group][0] || {});
}

function saveTuition(){

let grade = document.getElementById("grade").value;
let section = document.getElementById("section").value.trim();
let amount = document.getElementById("amount").value;

if(!grade || !amount){
    alert("Please complete required fields");
    return;
}

let rule = {
    grade: grade,
    section: section.toUpperCase(),
    amount: parseFloat(amount)
};

// remove duplicate rule (same grade + section)
tuitionRules = tuitionRules.filter(r =>
    !(r.grade === grade && r.section === rule.section)
);

tuitionRules.push(rule);

localStorage.setItem("tuitionRules", JSON.stringify(tuitionRules));

alert("Tuition rule saved!");

}

function getTuition(grade, section){

// priority: exact match (grade + section)
let exact = tuitionRules.find(r =>
    r.grade === grade &&
    r.section === section.toUpperCase()
);

if(exact) return exact.amount;

// fallback: grade-only rule
let gradeOnly = tuitionRules.find(r =>
    r.grade === grade && r.section === ""
);

if(gradeOnly) return gradeOnly.amount;

// default fallback
return 0;

}

if (localStorage.getItem("role") !== "admin") {
    window.location.href = "login.html";
}
function logout() {
    localStorage.removeItem("role");
    window.location.href = "login.html";
}

function saveData(){
localStorage.setItem("tuitionData", JSON.stringify(tuitionData));
}

window.onload = renderTables;
</script>

</body>
</html>
